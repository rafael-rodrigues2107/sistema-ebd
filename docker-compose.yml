services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ebd
      POSTGRES_USER: ebd_user
      POSTGRES_PASSWORD: ebd_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebd_user -d ebd"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ebd_user:ebd_pass@db:5432/ebd
      DEBUG: "true"
      SECRET_KEY: dev-secret-change-me
    depends_on:
      db:
        condition: service_healthy
    # Volume removido: Google Drive virtual (G:\Meu Drive) não entrega
    # bind-mounts corretamente no Docker Desktop Windows.
    # O código é copiado durante o build (COPY . . no Dockerfile).
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info"]

volumes:
  pgdata:
