services:
  app:
    build: .
    restart: always
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/ebd.db
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ebd_data:/data
    expose:
      - "8000"
    networks:
      - ebd_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - ebd_net

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    networks:
      - ebd_net

networks:
  ebd_net:
    driver: bridge

volumes:
  ebd_data:
  certbot_www:
  certbot_certs:
